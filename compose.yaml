services:
  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg

  # Local AWS emulator (MiniStack, MIT) on :4566 — KMS + DynamoDB for local dev.
  # Drop-in replacement for LocalStack: same port + API, LocalStack-health-compatible.
  ministack:
    image: ministackorg/ministack:latest   # pin to a released tag once settled
    ports:
      - "4566:4566"
    environment:
      GATEWAY_PORT: 4566
      LOG_LEVEL: INFO
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1

  # One-shot init: waits for MiniStack, then creates the KMS alias/demo key + audit DynamoDB table.
  # Runs the AWS CLI from a sidecar (MiniStack ships no awslocal), reaching MiniStack over the compose
  # network; AWS_ENDPOINT_URL points every aws call at it. Exits once the scripts complete.
  ministack-init:
    image: amazon/aws-cli:latest
    depends_on:
      - ministack
    environment:
      AWS_ENDPOINT_URL: http://ministack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./ministack/init:/init:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        until aws kms list-keys >/dev/null 2>&1; do echo "waiting for ministack..."; sleep 2; done
        for s in /init/*.sh; do echo "== running $$s =="; bash "$$s"; done
        echo "ministack-init complete"
